<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Banner version for README header -->
  
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1929;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#132F4C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1929;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bannerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009FDF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4DFFDF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bannerAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFA07A;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Left icon/logo -->
  <g transform="translate(50, 50)">
    <!-- Transformation ring -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#bannerRing)" stroke-width="2" opacity="0.4"/>
    
    <!-- DataFrame grid -->
    <rect x="30" y="30" width="140" height="140" fill="#0A1929" rx="8"/>
    
    <!-- Grid lines -->
    <line x1="30" y1="65" x2="170" y2="65" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="100" x2="170" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="135" x2="170" y2="135" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    
    <line x1="77" y1="30" x2="77" y2="170" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="123" y1="30" x2="123" y2="170" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Highlight cells -->
    <rect x="35" y="35" width="37" height="25" fill="url(#bannerAccent)" rx="3" opacity="0.7"/>
    <rect x="82" y="70" width="36" height="25" fill="url(#bannerAccent)" rx="3" opacity="0.5"/>
    <rect x="128" y="105" width="37" height="25" fill="url(#bannerAccent)" rx="3" opacity="0.6"/>
    
    <!-- Border -->
    <rect x="30" y="30" width="140" height="140" fill="none" stroke="url(#bannerRing)" stroke-width="2.5" rx="8"/>
  </g>
  
  <!-- Main title -->
  <text x="280" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="80" font-weight="bold" 
        fill="url(#bannerRing)" letter-spacing="3">ProteusFrame</text>
  
  <!-- Subtitle -->
  <text x="280" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="28" 
        fill="#4DFFDF" opacity="0.9" letter-spacing="2">
    Type-Safe, Multi-Backend DataFrames for Python
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(280, 210)">
    <!-- Pandas badge -->
    <rect x="0" y="0" width="100" height="35" fill="#00D9FF" opacity="0.2" rx="17.5"/>
    <text x="50" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
          fill="#00D9FF" text-anchor="middle">Pandas</text>
    
    <!-- Polars badge -->
    <rect x="115" y="0" width="95" height="35" fill="#4DFFDF" opacity="0.2" rx="17.5"/>
    <text x="162" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
          fill="#4DFFDF" text-anchor="middle">Polars</text>
    
    <!-- Type-safe badge -->
    <rect x="225" y="0" width="115" height="35" fill="#FF6B9D" opacity="0.2" rx="17.5"/>
    <text x="282" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
          fill="#FF6B9D" text-anchor="middle">Type-Safe</text>
    
    <!-- Pandera badge -->
    <rect x="355" y="0" width="110" height="35" fill="#FFA07A" opacity="0.2" rx="17.5"/>
    <text x="410" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
          fill="#FFA07A" text-anchor="middle">Pandera</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1100" cy="80" r="40" fill="url(#bannerRing)" opacity="0.1"/>
  <circle cx="1050" cy="200" r="60" fill="url(#bannerAccent)" opacity="0.08"/>
  <circle cx="1130" cy="150" r="25" fill="#4DFFDF" opacity="0.15"/>
</svg>
