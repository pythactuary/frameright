[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "structframe"
version = "0.1.0"
authors = [
  { name="Your Name", email="your.email@example.com" },
]
description = "A lightweight Object-DataFrame Mapper (ODM) for Pandas."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas>=1.0.0",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Information Analysis",
]

[project.urls]
"Homepage" = "https://github.com/yourusername/structframe"
"Bug Tracker" = "https://github.com/yourusername/structframe/issues"